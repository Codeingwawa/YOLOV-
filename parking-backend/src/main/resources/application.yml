server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/parking_management?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: parkingManagementSecretKey2024VeryLongSecretKeyForSecurity
  expiration: 86400000

plate-recognition:
  service-url: http://localhost:5000
  timeout: 30000

parking:
  hourly-rate: 5.0
  max-daily-fee: 50.0
